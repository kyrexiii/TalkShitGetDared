name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Check for Data Generation Changes
      run: |
        pnpm run prebuild
        if [[ -n $(git status --porcelain) ]]; then
          echo "::error::Data exports generation caused unstaged changes. Contributors should commit the generated changes or the generator itself must be run locally."
          git diff
          exit 1
        fi

    - name: Lint
      run: pnpm run lint

    - name: Build
      run: pnpm run build

    - name: Test
      run: pnpm run test
